services:
  bitcrm:
    build: .
    container_name: bitcrm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      FLASK_CONFIG_CLASS: ${FLASK_CONFIG_CLASS:-config.ProductionConfig}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///instance/bitcrm.db}
    ports:
      - "${BITCRM_PORT:-8080}:${PORT:-8080}"
    volumes:
      - bitcrm_instance:/app/instance
      - bitcrm_logs:/app/logs

volumes:
  bitcrm_instance:
  bitcrm_logs:
